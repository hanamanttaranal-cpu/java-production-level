server.port=8080
server.servlet.context-path=/api

# DATABASE
spring.datasource.url=jdbc:mysql://mysql:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=ecomm_user
spring.datasource.password=ecommpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
app.jwt.secret=yourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=*

# LOGGING
logging.level.org.springframework=INFO
logging.level.com.ecommerce=DEBUG

# STRIPE CONFIGURATION
stripe.secret.key=${STRIPE_SECRET_KEY}

