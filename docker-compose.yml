version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: ecomm_user
      MYSQL_PASSWORD: ecommpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-network1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ecommerce-backend
    restart: always
    environment:
      # Use underscores here to ensure Spring Boot maps them correctly
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=ecomm_user
      - SPRING_DATASOURCE_PASSWORD=ecommpassword
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network1
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: ecommerce-frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - ecommerce-network1
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  ecommerce-network1:
    driver: bridge
